<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>我的日程</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-dark: #0F6E56;
    --teal-border: #5DCAA5;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-mid: #378ADD;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --bg3: #f1efe8;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --text3: #aaa;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
      --text: #f0f0f0; --text2: #aaa; --text3: #666;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --teal-light: #0a3328; --blue-light: #0c2340;
      --red-light: #2d1212;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .nav-row { display: flex; align-items: center; gap: 6px; }
  .nav-btn { background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius); padding: 6px 10px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all 0.15s; }
  .nav-btn:hover { background: var(--bg2); }
  .today-btn { font-weight: 500; color: var(--text); }
  .week-strip { display: flex; gap: 6px; margin-bottom: 1.25rem; overflow-x: auto; padding-bottom: 2px; }
  .day-pill { flex: 1; min-width: 60px; border-radius: var(--radius); border: 1px solid var(--border); padding: 9px 6px; text-align: center; cursor: pointer; background: var(--bg); transition: all 0.15s; }
  .day-pill:hover { border-color: var(--border2); background: var(--bg2); }
  .day-pill.active { border: 2px solid var(--teal-border); background: var(--teal-light); }
  .day-pill .day-name { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; }
  .day-pill.active .day-name { color: var(--teal-dark); }
  .day-pill .day-num { font-size: 17px; font-weight: 600; color: var(--text); margin-top: 2px; }
  .day-pill.active .day-num { color: var(--teal-dark); }
  .dot-row { display: flex; justify-content: center; gap: 3px; margin-top: 4px; min-height: 5px; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--teal); }
  .dot.overdue { background: var(--red); }
  .card { background: var(--bg); border-radius: var(--radius-lg); border: 1px solid var(--border); margin-bottom: 1rem; overflow: hidden; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .section-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; }
  .sync-all-btn { border: 1px solid var(--blue-mid); background: none; border-radius: var(--radius); padding: 4px 12px; font-size: 12px; cursor: pointer; color: var(--blue); font-weight: 500; display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
  .sync-all-btn:hover { background: var(--blue-light); }
  .sync-all-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .task-list { padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  .task-item { display: flex; align-items: center; gap: 10px; padding: 10px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg2); transition: all 0.15s; }
  .task-item.done { opacity: 0.45; }
  .task-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .task-check.checked { background: var(--teal); border-color: var(--teal); }
  .task-check i { font-size: 12px; color: white; display: none; }
  .task-check.checked i { display: block; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-item.done .task-title { text-decoration: line-through; }
  .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
  .task-time { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 3px; }
  .badge { font-size: 10px; padding: 1px 7px; border-radius: 10px; }
  .badge-repeat { color: var(--teal-dark); background: var(--teal-light); }
  .badge-synced { color: var(--blue); background: var(--blue-light); display: flex; align-items: center; gap: 3px; }
  .task-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .icon-btn { border: none; background: none; cursor: pointer; color: var(--text2); font-size: 15px; padding: 4px 6px; border-radius: 5px; opacity: 0.5; transition: all 0.15s; }
  .icon-btn:hover { opacity: 1; background: var(--bg3); }
  .icon-btn.cal { color: var(--blue); opacity: 0.7; }
  .icon-btn.cal:hover { opacity: 1; background: var(--blue-light); }
  .empty-state { text-align: center; padding: 2.5rem; color: var(--text2); font-size: 14px; }
  .empty-state i { font-size: 32px; display: block; margin-bottom: 10px; color: var(--text3); }
  .input-card { background: var(--bg); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; margin-bottom: 1rem; }
  .input-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; }
  .input-row i { color: var(--teal); font-size: 18px; flex-shrink: 0; }
  .input-row input { flex: 1; border: none; background: transparent; font-size: 14px; color: var(--text); outline: none; font-family: inherit; min-width: 0; }
  .input-row input::placeholder { color: var(--text3); }
  .add-btn { border: none; background: var(--teal); color: white; border-radius: var(--radius); padding: 7px 16px; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; transition: all 0.15s; }
  .add-btn:hover { background: var(--teal-dark); }
  .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .status-bar { padding: 8px 14px; font-size: 12px; border-top: 1px solid var(--border); color: var(--text2); display: none; align-items: center; gap: 7px; }
  .status-bar.show { display: flex; }
  .status-bar.ok { color: var(--teal-dark); }
  .status-bar.err { color: #a32d2d; }
  .gcal-card { background: var(--bg); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text2); }
  .gcal-card.connected { border-color: var(--teal-border); background: var(--teal-light); color: var(--teal-dark); }
  .gcal-card.error { border-color: var(--red); background: var(--red-light); color: #a32d2d; }
  .gcal-btn { margin-left: auto; border: 1px solid; border-radius: var(--radius); padding: 5px 14px; font-size: 12px; cursor: pointer; font-weight: 500; white-space: nowrap; transition: all 0.15s; background: none; }
  .gcal-btn.connect { border-color: var(--blue-mid); color: var(--blue); }
  .gcal-btn.connect:hover { background: var(--blue-light); }
  .gcal-btn.disconnect { border-color: var(--border2); color: var(--text2); }
  .gcal-btn.disconnect:hover { background: var(--bg2); }
  .spinner { width: 13px; height: 13px; border: 1.5px solid var(--border2); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .config-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .config-overlay.show { display: flex; }
  .config-box { background: var(--bg); border-radius: var(--radius-lg); padding: 1.5rem; max-width: 440px; width: 100%; }
  .config-box h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .config-box p { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 1rem; }
  .config-box ol { font-size: 13px; color: var(--text2); line-height: 2; padding-left: 1.2rem; margin-bottom: 1rem; }
  .config-box ol a { color: var(--blue); text-decoration: none; }
  .config-box ol a:hover { text-decoration: underline; }
  .config-box label { font-size: 12px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .config-box input { width: 100%; border: 1px solid var(--border2); border-radius: var(--radius); padding: 9px 12px; font-size: 13px; background: var(--bg2); color: var(--text); outline: none; margin-bottom: 12px; font-family: monospace; }
  .config-box input:focus { border-color: var(--teal); }
  .config-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-cancel { border: 1px solid var(--border2); background: none; border-radius: var(--radius); padding: 7px 16px; font-size: 13px; cursor: pointer; color: var(--text2); }
  .btn-save { border: none; background: var(--teal); color: white; border-radius: var(--radius); padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); border-radius: var(--radius); padding: 10px 18px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 300; white-space: nowrap; max-width: 90vw; text-align: center; }
  .toast.show { opacity: 1; }
  @media (max-width: 500px) {
    .container { padding: 1rem 0.75rem 4rem; }
    .header h1 { font-size: 18px; }
    .day-pill { min-width: 44px; }
    .day-pill .day-num { font-size: 15px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>我的日程</h1>
      <div class="header-sub" id="today-label"></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="prev-btn"><i class="ti ti-chevron-left"></i></button>
      <button class="nav-btn today-btn" id="jump-today-btn">今天</button>
      <button class="nav-btn" id="next-btn"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>

  <div class="week-strip" id="week-strip"></div>

  <!-- AI 配置状态栏 -->
  <div class="gcal-card" id="gcal-card">
    <i class="ti ti-sparkles" style="font-size:18px;color:var(--teal);flex-shrink:0"></i>
    <span id="gcal-status-text">配置DeepSeek API Key 以启用自然语言输入</span>
    <button class="gcal-btn connect" id="gcal-main-btn">配置 API</button>
  </div>

  <!-- 任务卡片 -->
  <div class="card">
    <div class="card-header">
      <span class="section-label" id="day-section-label"></span>
      <button class="sync-all-btn" id="sync-all-btn" style="display:none">
        <i class="ti ti-calendar-up"></i> 一键同步当日
      </button>
    </div>
    <div class="task-list" id="task-list"></div>
  </div>

  <!-- 输入框 -->
  <div class="input-card">
    <div class="input-row">
      <i class="ti ti-sparkles"></i>
      <input type="text" id="task-input" placeholder="输入任意描述，如"5.29号3点交论文"或"每周一开组会"…">
      <button class="add-btn" id="send-btn">添加</button>
    </div>
    <div class="status-bar" id="ai-status"></div>
  </div>

</div>

<!-- Google API 配置弹窗 -->
<div class="config-overlay" id="config-overlay">
  <div class="config-box">
    <h2>配置 AI 解析</h2>
    <p>填入DeepSeek API Key，用于识别"5月29号3点交论文"这样的自然语言描述。</p>
    <ol>
      <li>前往 <a href="https://platform.deepseek.com/api_keys" target="_blank">platform.deepseek.com/api_keys</a> 并登录</li>
      <li>点击 <strong>创建 API Key</strong>，名称随意填</li>
      <li>复制生成的 Key 粘贴到下方</li>
    </ol>
    <input type="text" id="client-id-input" style="display:none">
    <label>DeepSeek API Key</label>
    <input type="password" id="anthropic-key-input" placeholder="填入你的DeepSeek API Key">
    <p style="color:var(--text3);font-size:11px;margin-top:-6px;margin-bottom:12px">Key 仅存储在你的浏览器本地，不会上传到任何服务器。</p>
    <div class="config-actions">
      <button class="btn-cancel" id="config-cancel">取消</button>
      <button class="btn-save" id="config-save">保存并连接</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS_CN = ['日','一','二','三','四','五','六'];
const MONTHS_CN = ['一','二','三','四','五','六','七','八','九','十','十一','十二'];
const GCAL_SCOPES = 'https://www.googleapis.com/auth/calendar.events';

// ── State ──────────────────────────────────────────────
let weekOffset = 0;
let selectedDate = todayDate();
let tasks = {};
let repeatTasks = [];
let gapiReady = false;
let tokenClient = null;
let accessToken = null;

function todayDate() {
  const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseDateKey(s) {
  const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d);
}

// ── Storage ─────────────────────────────────────────────
function loadLocal() {
  try { tasks = JSON.parse(localStorage.getItem('tasks_v2') || '{}'); } catch(e) { tasks = {}; }
  try { repeatTasks = JSON.parse(localStorage.getItem('repeat_tasks_v2') || '[]'); } catch(e) { repeatTasks = []; }
}
function saveLocal() {
  localStorage.setItem('tasks_v2', JSON.stringify(tasks));
  localStorage.setItem('repeat_tasks_v2', JSON.stringify(repeatTasks));
}
function getConfig() {
  return {
    clientId: localStorage.getItem('gcal_client_id') || '',
    anthropicKey: localStorage.getItem('anthropic_key') || ''
  };
}
function saveConfig(cid, akey) {
  localStorage.setItem('gcal_client_id', cid);
  localStorage.setItem('anthropic_key', akey);
}

// ── Tasks ────────────────────────────────────────────────
function getTasksForDate(d) {
  const key = dateKey(d);
  const regular = tasks[key] ? [...tasks[key]] : [];
  const repeating = repeatTasks
    .filter(rt => { const s = parseDateKey(rt.startDate); return d >= s && d.getDay() === rt.weekday; })
    .map(rt => ({
      id: 'rep_' + rt.id + '_' + dateKey(d),
      title: rt.title, time: rt.time, done: false,
      repeat: true, repeatId: rt.id, gcalId: rt.gcalId || null
    }));
  // merge done state for repeat tasks
  repeating.forEach(rt => {
    const ov = (tasks[key]||[]).find(t => t.id === rt.id);
    if (ov) { rt.done = ov.done; rt.gcalId = ov.gcalId || rt.gcalId; }
  });
  return [...regular, ...repeating];
}

// ── Google Identity / GAPI ────────────────────────────────
function loadGoogleScripts(clientId) {
  return new Promise((resolve) => {
    let loaded = 0;
    const check = () => { if (++loaded === 2) resolve(); };
    if (!document.getElementById('gsi-script')) {
      const s = document.createElement('script');
      s.id = 'gsi-script'; s.src = 'https://accounts.google.com/gsi/client'; s.async = true;
      s.onload = check; document.head.appendChild(s);
    } else check();
    if (!document.getElementById('gapi-script')) {
      const s = document.createElement('script');
      s.id = 'gapi-script'; s.src = 'https://apis.google.com/js/api.js'; s.async = true;
      s.onload = () => { gapi.load('client', () => { gapiReady = true; check(); }); };
      document.head.appendChild(s);
    } else { if (gapiReady) check(); else gapi.load('client', () => { gapiReady = true; check(); }); }
  });
}

async function initGcal() {
  const { anthropicKey } = getConfig();
  if (anthropicKey) {
    updateGcalUI('connected');
  } else {
    updateGcalUI('none');
  }
}

function updateGcalUI(state) {
  const card = document.getElementById('gcal-card');
  const text = document.getElementById('gcal-status-text');
  const btn = document.getElementById('gcal-main-btn');
  const syncAllBtn = document.getElementById('sync-all-btn');
  card.className = 'gcal-card';
  if (state === 'none') {
    text.textContent = '请配置DeepSeek API Key 以启用自然语言输入';
    btn.className = 'gcal-btn connect'; btn.textContent = '配置 API';
    btn.onclick = () => document.getElementById('config-overlay').classList.add('show');
    syncAllBtn.style.display = 'none';
  } else if (state === 'ready') {
    text.textContent = '点击连接 Google Calendar，获得手机原生提醒';
    btn.className = 'gcal-btn connect'; btn.textContent = '授权登录';
    btn.onclick = () => tokenClient.requestAccessToken({ prompt: 'consent' });
    syncAllBtn.style.display = 'none';
  } else if (state === 'connected') {
    card.className = 'gcal-card connected';
    text.textContent = 'DeepSeek AI 已配置，自然语言输入已启用';
    btn.className = 'gcal-btn disconnect'; btn.textContent = '修改 Key';
    btn.onclick = () => document.getElementById('config-overlay').classList.add('show');
    syncAllBtn.style.display = 'none';
  } else if (state === 'error') {
    card.className = 'gcal-card error';
    text.textContent = '连接失败，请检查客户端 ID 配置';
    btn.className = 'gcal-btn connect'; btn.textContent = '重新配置';
    btn.onclick = () => document.getElementById('config-overlay').classList.add('show');
    syncAllBtn.style.display = 'none';
  }
}

// ── Sync to Google Calendar ───────────────────────────────
async function syncTaskToGcal(task, dateForTask) {
  if (!accessToken) { showToast('请先连接 Google Calendar'); return false; }
  const dateStr = dateKey(dateForTask);
  let resource;
  if (task.repeat) {
    const rruleDays = ['SU','MO','TU','WE','TH','FR','SA'];
    const wd = rruleDays[dateForTask.getDay()];
    if (task.time) {
      const [h, m] = task.time.split(':').map(Number);
      const endH = String(h + (m + 30 >= 60 ? 1 : 0)).padStart(2,'0');
      const endM = String((m + 30) % 60).padStart(2,'0');
      resource = {
        summary: task.title,
        start: { dateTime: `${dateStr}T${task.time}:00`, timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
        end: { dateTime: `${dateStr}T${endH}:${endM}:00`, timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
        recurrence: [`RRULE:FREQ=WEEKLY;BYDAY=${wd}`],
        reminders: { useDefault: false, overrides: [{ method: 'popup', minutes: 30 }] }
      };
    } else {
      resource = {
        summary: task.title,
        start: { date: dateStr }, end: { date: dateStr },
        recurrence: [`RRULE:FREQ=WEEKLY;BYDAY=${wd}`],
        reminders: { useDefault: false, overrides: [{ method: 'popup', minutes: 540 }] }
      };
    }
  } else {
    if (task.time) {
      const [h, m] = task.time.split(':').map(Number);
      const endH = String(h + (m + 30 >= 60 ? 1 : 0)).padStart(2,'0');
      const endM = String((m + 30) % 60).padStart(2,'0');
      resource = {
        summary: task.title,
        start: { dateTime: `${dateStr}T${task.time}:00`, timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
        end: { dateTime: `${dateStr}T${endH}:${endM}:00`, timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
        reminders: { useDefault: false, overrides: [{ method: 'popup', minutes: 30 }] }
      };
    } else {
      resource = {
        summary: task.title,
        start: { date: dateStr }, end: { date: dateStr },
        reminders: { useDefault: false, overrides: [{ method: 'popup', minutes: 540 }] }
      };
    }
  }
  try {
    const resp = await gapi.client.calendar.events.insert({ calendarId: 'primary', resource });
    const gcalId = resp.result.id;
    // mark synced
    const key = dateKey(dateForTask);
    if (!tasks[key]) tasks[key] = [];
    if (task.repeatId) {
      const rt = repeatTasks.find(r => r.id === task.repeatId);
      if (rt) rt.gcalId = gcalId;
      let ov = tasks[key].find(t => t.id === task.id);
      if (!ov) { tasks[key].push({id: task.id, title: task.title, time: task.time, done: task.done, gcalId}); }
      else ov.gcalId = gcalId;
    } else {
      const t = tasks[key].find(t => t.id === task.id);
      if (t) t.gcalId = gcalId;
    }
    saveLocal();
    return true;
  } catch(e) {
    console.error(e);
    return false;
  }
}

async function handleSyncOne(btn, task) {
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="border-top-color:var(--blue)"></span>';
  const ok = await syncTaskToGcal(task, selectedDate);
  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-calendar-check"></i>';
  if (ok) { showToast(`✓ "${task.title}" 已同步`); renderAll(); }
  else showToast('同步失败，请重试', 'err');
}

document.getElementById('sync-all-btn').onclick = async () => {
  const btn = document.getElementById('sync-all-btn');
  const tasks4day = getTasksForDate(selectedDate).filter(t => !t.gcalId);
  if (!tasks4day.length) { showToast('当日所有事项已同步'); return; }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 同步中…';
  let ok = 0;
  for (const t of tasks4day) { if (await syncTaskToGcal(t, selectedDate)) ok++; }
  btn.disabled = false; btn.innerHTML = '<i class="ti ti-calendar-up"></i> 一键同步当日';
  showToast(ok ? `✓ 已同步 ${ok} 项到 Google Calendar` : '同步失败，请重试', ok ? 'ok' : 'err');
  renderAll();
};

// ── Render ────────────────────────────────────────────────
function renderWeekStrip() {
  const strip = document.getElementById('week-strip');
  strip.innerHTML = '';
  const base = todayDate();
  base.setDate(base.getDate() + weekOffset * 7);
  const mon = new Date(base);
  mon.setDate(base.getDate() - base.getDay() + 1);
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    const pill = document.createElement('div');
    pill.className = 'day-pill' + (dateKey(d) === dateKey(selectedDate) ? ' active' : '');
    const dt = getTasksForDate(d);
    const dots = dt.slice(0,3).map(t => `<div class="dot${d < todayDate() && !t.done ? ' overdue' : ''}"></div>`).join('');
    pill.innerHTML = `<div class="day-name">周${DAYS_CN[d.getDay()]}</div><div class="day-num">${d.getDate()}</div><div class="dot-row">${dots}</div>`;
    pill.onclick = () => { selectedDate = d; renderAll(); };
    strip.appendChild(pill);
  }
}

function renderTasks() {
  const list = document.getElementById('task-list');
  const label = document.getElementById('day-section-label');
  const tasks4day = getTasksForDate(selectedDate);
  const isToday = dateKey(selectedDate) === dateKey(todayDate());
  label.textContent = isToday ? '今日事项' : `${selectedDate.getMonth()+1}月${selectedDate.getDate()}日事项`;
  if (!tasks4day.length) {
    list.innerHTML = `<div class="empty-state"><i class="ti ti-calendar-off"></i>暂无待办事项</div>`;
    return;
  }
  list.innerHTML = '';
  tasks4day.forEach(task => {
    const div = document.createElement('div');
    div.className = 'task-item' + (task.done ? ' done' : '');
    const calIcon = task.gcalId
      ? `<button class="icon-btn cal" disabled title="已同步"><i class="ti ti-calendar-check"></i></button>`
      : accessToken
        ? `<button class="icon-btn cal sync-one" title="同步到 Google Calendar"><i class="ti ti-calendar-plus"></i></button>`
        : '';
    div.innerHTML = `
      <div class="task-check ${task.done ? 'checked' : ''}" data-id="${task.id}" data-repid="${task.repeatId||''}">
        <i class="ti ti-check"></i>
      </div>
      <div class="task-body">
        <div class="task-title">${escHtml(task.title)}</div>
        <div class="task-meta">
          ${task.time ? `<span class="task-time"><i class="ti ti-clock" style="font-size:10px"></i>${task.time}</span>` : ''}
          ${task.repeat ? '<span class="badge badge-repeat">每周循环</span>' : ''}
          ${task.gcalId ? '<span class="badge badge-synced"><i class="ti ti-brand-google" style="font-size:9px"></i>已同步</span>' : ''}
        </div>
      </div>
      <div class="task-actions">
        ${calIcon}
        <button class="icon-btn del-btn" data-id="${task.id}" data-repid="${task.repeatId||''}" title="删除"><i class="ti ti-trash"></i></button>
      </div>`;
    list.appendChild(div);
    div.querySelector('.task-check').onclick = () => toggleDone(task.id, task.repeatId);
    div.querySelector('.del-btn').onclick = () => deleteTask(task.id, task.repeatId);
    const sb = div.querySelector('.sync-one');
    if (sb) sb.onclick = () => handleSyncOne(sb, task);
  });
}

function renderAll() {
  renderWeekStrip();
  renderTasks();
  const d = selectedDate;
  document.getElementById('today-label').textContent =
    `${d.getFullYear()}年${MONTHS_CN[d.getMonth()]}月${d.getDate()}日 · 周${DAYS_CN[d.getDay()]}`;
}

function escHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toggleDone(id, repeatId) {
  const key = dateKey(selectedDate);
  if (!tasks[key]) tasks[key] = [];
  if (repeatId) {
    const ov = tasks[key].find(t => t.id === id);
    if (ov) ov.done = !ov.done;
    else tasks[key].push({id, title:'', time:'', done:true, repeat:true});
  } else {
    const t = tasks[key].find(t => t.id === id);
    if (t) t.done = !t.done;
  }
  saveLocal(); renderAll();
}
function deleteTask(id, repId) {
  if (repId) {
    if (!confirm('删除此循环任务的所有后续记录？')) return;
    repeatTasks = repeatTasks.filter(r => r.id !== repId);
  } else {
    const key = dateKey(selectedDate);
    if (tasks[key]) tasks[key] = tasks[key].filter(t => t.id !== id);
  }
  saveLocal(); renderAll();
}

// ── AI Parse ──────────────────────────────────────────────
async function parseWithAI(text) {
  const { anthropicKey } = getConfig();
  if (!anthropicKey) { showToast('请先在"配置 API"中填写 Anthropic Key', 'err'); return null; }
  const today = todayDate();
  const prompt = `你是日程解析助手。当前：${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（周${DAYS_CN[today.getDay()]}）。
用户输入：「${text}」
返回JSON（只返回JSON）：{"title":"任务名","date":"YYYY-MM-DD或null","time":"HH:MM或null","repeat":false,"weekday":null}
规则：repeat=true时填weekday(0=周日)；无日期→今天(${dateKey(today)})；"5.29"/"5月29"→当年；"3点"=15:00；"下午3点"=15:00；"上午10点"=10:00`;
  try {
    const resp = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + anthropicKey },
      body: JSON.stringify({ model: 'deepseek-chat', max_tokens: 200, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await resp.json();
    const raw = data.choices ? data.choices[0].message.content : '';
    return JSON.parse(raw.replace(/```json|```/g,'').trim());
  } catch(e) { return null; }
}

async function addTask() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.disabled = true;
  document.getElementById('send-btn').disabled = true;
  const statusEl = document.getElementById('ai-status');
  statusEl.className = 'status-bar show';
  statusEl.innerHTML = '<div class="spinner"></div><span>AI 解析中…</span>';

  const parsed = await parseWithAI(text);
  if (!parsed) {
    statusEl.className = 'status-bar show err';
    statusEl.innerHTML = '<i class="ti ti-x"></i><span>解析失败，请重试或检查 API Key</span>';
    input.disabled = false; document.getElementById('send-btn').disabled = false;
    setTimeout(() => statusEl.className='status-bar', 3500);
    return;
  }
  const id = 'task_' + Date.now();
  let msg = '';
  if (parsed.repeat) {
    const startDate = parsed.date || dateKey(todayDate());
    const weekday = parsed.weekday !== null ? parsed.weekday : parseDateKey(startDate).getDay();
    repeatTasks.push({ id, title: parsed.title, time: parsed.time, weekday, startDate });
    selectedDate = parseDateKey(startDate);
    msg = `已添加每周循环任务（周${DAYS_CN[weekday]}）`;
  } else {
    const targetDate = parsed.date ? parseDateKey(parsed.date) : todayDate();
    const key = dateKey(targetDate);
    if (!tasks[key]) tasks[key] = [];
    tasks[key].push({ id, title: parsed.title, time: parsed.time, done: false });
    selectedDate = targetDate;
    const diff = Math.floor((targetDate - todayDate()) / (7*24*3600*1000));
    weekOffset = diff >= 0 ? Math.floor(diff/7) : -Math.ceil(-diff/7);
    msg = `已添加到 ${targetDate.getMonth()+1}月${targetDate.getDate()}日${parsed.time ? ' · '+parsed.time : ''}`;
  }
  saveLocal();
  statusEl.className = 'status-bar show ok';
  statusEl.innerHTML = `<i class="ti ti-check"></i><span>${msg}</span>`;
  renderAll();
  input.disabled = false; document.getElementById('send-btn').disabled = false;
  setTimeout(() => statusEl.className='status-bar', 4000);
}

document.getElementById('send-btn').onclick = addTask;
document.getElementById('task-input').addEventListener('keydown', e => { if (e.key==='Enter') addTask(); });
document.getElementById('prev-btn').onclick = () => { weekOffset--; renderAll(); };
document.getElementById('next-btn').onclick = () => { weekOffset++; renderAll(); };
document.getElementById('jump-today-btn').onclick = () => { weekOffset=0; selectedDate=todayDate(); renderAll(); };

// ── Config Modal ──────────────────────────────────────────
document.getElementById('config-cancel').onclick = () => document.getElementById('config-overlay').classList.remove('show');
document.getElementById('config-save').onclick = () => {
  const cid = document.getElementById('client-id-input').value.trim();
  const akey = document.getElementById('anthropic-key-input').value.trim();
  if (!akey) { showToast('请填写DeepSeek API Key', 'err'); return; }
  saveConfig(cid, akey);
  document.getElementById('config-overlay').classList.remove('show');
  showToast('配置已保存');
  if (cid) initGcal();
};
// pre-fill saved values
document.getElementById('config-overlay').addEventListener('transitionend', () => {
  const { clientId, anthropicKey } = getConfig();
  document.getElementById('client-id-input').value = clientId;
  document.getElementById('anthropic-key-input').value = anthropicKey;
});
document.getElementById('config-overlay').onclick = e => {
  if (e.target === document.getElementById('config-overlay')) document.getElementById('config-overlay').classList.remove('show');
};

// ── Toast ─────────────────────────────────────────────────
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.className='toast', 3200);
}

// ── Daily Reminder (9am notification) ────────────────────
function scheduleReminder() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();
  const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 9, 0, 0);
  if (now >= target) target.setDate(target.getDate()+1);
  clearTimeout(window._reminderTimer);
  window._reminderTimer = setTimeout(() => {
    const todayTasks = getTasksForDate(todayDate()).filter(t => !t.done);
    if (todayTasks.length) {
      new Notification('📋 今日待办', { body: todayTasks.map(t => (t.time?`${t.time} `:'') + t.title).join('\n') });
    }
    scheduleReminder();
  }, target - now);
}
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission().then(p => { if (p==='granted') scheduleReminder(); });
} else if (Notification.permission === 'granted') {
  scheduleReminder();
}

// ── Init ──────────────────────────────────────────────────
loadLocal();
renderAll();
initGcal();

// pre-fill modal on open
document.getElementById('gcal-main-btn').addEventListener('click', () => {
  const { clientId, anthropicKey } = getConfig();
  document.getElementById('client-id-input').value = clientId;
  document.getElementById('anthropic-key-input').value = anthropicKey;
});
</script>
